    <linearGradient id="dna" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#85b89a"/><stop offset="100%" stop-color="#6b8f7a"/></linearGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#85b89a" stroke-width="2" opacity="0.9"/>
