  <line x1="35" y1="44" x2="55" y2="44" stroke="#8da3cc" stroke-width="1.5" opacity="0.4"/>
  <line x1="38" y1="56" x2="52" y2="56" stroke="#8da3cc" stroke-width="1.5" opacity="0.4"/>
  <line x1="35" y1="68" x2="55" y2="68" stroke="#8da3cc" stroke-width="1.5" opacity="0.4"/>
  <line x1="38" y1="80" x2="52" y2="80" stroke="#8da3cc" stroke-width="1.5" opacity="0.4"/>
