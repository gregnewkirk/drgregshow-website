    <rect x="75" y="30" width="7" height="7" rx="1" fill="#8da3cc" transform="rotate(45,78.5,33.5)"/>
    <rect x="38" y="63" width="7" height="7" rx="1" fill="#8da3cc" transform="rotate(45,41.5,66.5)"/>
