<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#dbb976" stroke-width="2" opacity="0.9"/>
  <!-- CRISPR Scissors -->
  <g transform="translate(60,52)">
    <!-- Left blade -->
    <ellipse cx="-18" cy="-8" rx="22" ry="7" fill="none" stroke="#dbb976" stroke-width="2.5" transform="rotate(-15)" opacity="0.85"/>
    <!-- Right blade -->
    <ellipse cx="18" cy="-8" rx="22" ry="7" fill="none" stroke="#dbb976" stroke-width="2.5" transform="rotate(15)" opacity="0.85"/>
    <!-- Pivot -->
    <circle cx="0" cy="0" r="5" fill="#d0946e" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.5" fill="#1a1a2e"/>
    <!-- Handles -->
    <path d="M-12,8 Q-20,25 -8,30 Q-2,18 -6,8" fill="#85b89a" opacity="0.6"/>
    <path d="M12,8 Q20,25 8,30 Q2,18 6,8" fill="#85b89a" opacity="0.6"/>
  </g>
  <!-- DNA being cut -->
  <line x1="20" y1="28" x2="48" y2="42" stroke="#8da3cc" stroke-width="2" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="72" y1="42" x2="100" y2="28" stroke="#8da3cc" stroke-width="2" opacity="0.4" stroke-dasharray="3,3"/>
  <!-- Sparkles -->
  <circle cx="50" cy="38" r="2" fill="#dbb976" opacity="0.6"/>
  <circle cx="70" cy="38" r="2" fill="#dbb976" opacity="0.6"/>
  <!-- Nobel star -->
  <polygon points="60,12 62,18 68,18 63,22 65,28 60,24 55,28 57,22 52,18 58,18" fill="#dbb976" opacity="0.7"/>
  <text x="60" y="108" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#dbb976" opacity="0.6">CRISPR PIONEER</text>
</svg>