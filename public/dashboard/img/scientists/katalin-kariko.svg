<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient></defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#d0946e" stroke-width="2" opacity="0.9"/>
  <!-- mRNA strand (wavy) -->
  <path d="M18,50 Q28,35 38,50 Q48,65 58,50 Q68,35 78,50 Q88,65 98,50" fill="none" stroke="#d0946e" stroke-width="3" opacity="0.8"/>
  <!-- Modified nucleosides (key discovery) -->
  <circle cx="28" cy="42" r="4" fill="#dbb976" opacity="0.7"/>
  <circle cx="48" cy="58" r="4" fill="#dbb976" opacity="0.7"/>
  <circle cx="68" cy="42" r="4" fill="#dbb976" opacity="0.7"/>
  <circle cx="88" cy="58" r="4" fill="#dbb976" opacity="0.7"/>
  <!-- Ribosome reading mRNA -->
  <ellipse cx="58" cy="50" rx="10" ry="8" fill="#85b89a" opacity="0.25"/>
  <!-- Protein being produced -->
  <path d="M55,62 Q50,72 55,78 Q60,72 65,78 Q70,72 65,62" fill="none" stroke="#85b89a" stroke-width="2" opacity="0.5"/>
  <!-- Nobel star -->
  <polygon points="60,14 62,20 68,20 63,24 65,30 60,26 55,30 57,24 52,20 58,20" fill="#dbb976" opacity="0.7"/>
  <!-- Syringe (vaccine) -->
  <g transform="translate(85,78) rotate(-45)">
    <rect x="-2" y="-12" width="4" height="16" rx="1" fill="#8da3cc" opacity="0.5"/>
    <rect x="-3.5" y="-14" width="7" height="4" rx="1" fill="#8da3cc" opacity="0.4"/>
    <line x1="0" y1="4" x2="0" y2="8" stroke="#8da3cc" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="60" y="108" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#d0946e" opacity="0.6">mRNA PIONEER</text>
</svg>