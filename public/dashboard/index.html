<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dr. Greg — Science Show</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#1a1c2e;--surface:rgba(34,37,56,0.98);--surface-solid:#222538;
      --border:rgba(255,255,255,0.22);--border-2:rgba(255,255,255,0.35);
      --text:#ffffff;--text-2:#eee8e0;--text-3:#c0bdd0;
      --gold:#ffd96e;--gold-dim:rgba(255,217,110,0.25);
      --sage:#6ef0a8;--sage-dim:rgba(110,240,168,0.22);
      --warm:#ffa870;--warm-dim:rgba(255,168,112,0.25);
      --slate:#a0c8ff;--slate-dim:rgba(160,200,255,0.22);
      --live:#ff5555;
    }
    html{font-size:200%}
    body{
      background:var(--bg);color:var(--text);
      font-family:'DM Sans',-apple-system,sans-serif;
      height:100vh;height:100dvh;overflow:hidden;
      display:flex;justify-content:center;
    }
    .shell{
      width:100%;max-width:720px;height:100vh;height:100dvh;
      display:flex;flex-direction:column;position:relative;overflow:hidden;
    }

    /* === TICKER (top) === */
    .ticker{
      position:relative;z-index:20;
      background:var(--surface-solid);
      border-bottom:2px solid var(--border-2);
      padding:8px 0;overflow:hidden;flex-shrink:0;
    }
    .ticker-track{
      display:flex;white-space:nowrap;
      animation:tkscroll 50s linear infinite;
      font-size:0.75rem;font-weight:800;color:var(--text);letter-spacing:0.5px;
    }
    .ticker-track span{margin-right:36px}
    .ticker-track .hl{color:var(--gold);font-weight:800}
    .ticker-track .hl{color:var(--gold)}
    @keyframes tkscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* === MAIN STAGE === */
    .stage{
      flex:1;display:flex;flex-direction:column;
      position:relative;z-index:10;overflow:hidden;
    }

    /* Top content panel — grows to fit, pushes viz down */
    .content-panel{
      flex:1 1 auto;position:relative;z-index:5;
      overflow-y:auto;overflow-x:hidden;
      padding:12px 14px;
      display:flex;flex-direction:column;
      scrollbar-width:none;
      background:linear-gradient(180deg, var(--bg) 0%, rgba(26,28,46,0.7) 100%);
    }
    .content-panel::-webkit-scrollbar{display:none}

    /* Floating stats */
    .stats-row{
      display:flex;gap:6px;flex-wrap:nowrap;justify-content:center;overflow:hidden;
      margin-bottom:8px;height:2rem;align-items:center;
    }
    .stat-chip{
      display:flex;align-items:center;gap:5px;white-space:nowrap;
      padding:4px 10px;border-radius:6px;height:1.7rem;
      font-family:'JetBrains Mono',monospace;
      font-size:0.6rem;font-weight:800;
      border:1px solid var(--border-2);
      background:rgba(255,255,255,0.14);
      color:var(--text);
      animation:fadeIn 0.6s ease-out both;
    }
    .stat-chip .num{color:var(--gold);font-size:0.7rem;font-weight:900;text-shadow:0 0 10px rgba(255,217,110,0.5)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

    /* Divider */
    .divider{
      height:2px;background:var(--border-2);flex-shrink:0;
      position:relative;z-index:5;
    }

    /* Bottom canvas panel ~42% */
    .viz-panel{
      flex:0 1 38%;min-height:120px;position:relative;overflow:hidden;
    }
    .viz-panel canvas{
      width:100%;height:100%;display:block;
    }
    .viz-label{
      position:absolute;top:8px;left:50%;transform:translateX(-50%);
      background:rgba(26,28,46,0.9);backdrop-filter:blur(8px);
      padding:5px 14px;border-radius:8px;
      font-size:0.6rem;font-weight:800;color:var(--text);
      letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;
      border:2px solid var(--border-2);z-index:5;
    }

    /* === BOTTOM BAR (branding) === */
    .bottom-bar{
      position:relative;z-index:20;
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 16px;
      background:var(--surface-solid);
      border-top:2px solid var(--border-2);
      flex-shrink:0;
    }
    .brand{display:flex;align-items:center;gap:8px}
    .brand-icon{
      width:38px;height:38px;border-radius:8px;
      background:linear-gradient(135deg,var(--sage),var(--gold));
      display:flex;align-items:center;justify-content:center;font-size:18px;
    }
    .brand h1{font-size:1.05rem;font-weight:900;letter-spacing:-0.02em}
    .brand .sub{font-size:0.65rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:1.5px}
    .live-pill{
      display:flex;align-items:center;gap:6px;
      background:rgba(255,85,85,0.2);border:2px solid rgba(255,85,85,0.45);
      padding:6px 16px;border-radius:16px;
      font-size:0.7rem;font-weight:900;color:var(--live);letter-spacing:1.5px;
    }
    .live-dot{width:8px;height:8px;background:var(--live);border-radius:50%;animation:blink 1.2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .audio-btn{
      background:rgba(255,255,255,0.06);border:1px solid var(--border);
      color:var(--text-2);width:38px;height:38px;border-radius:8px;
      font-size:1.1rem;cursor:pointer;transition:all 0.2s;
      display:flex;align-items:center;justify-content:center;
    }
    .audio-btn:hover{background:var(--border);color:var(--text)}
    .audio-btn.active{color:var(--gold);border-color:rgba(196,162,101,0.3);background:var(--gold-dim)}

    /* === TRANSITIONS === */
    .dissolve-out{animation:dissolveOut 0.3s ease-in forwards}
    .dissolve-in{animation:dissolveIn 0.4s ease-out forwards}
    @keyframes dissolveOut{
      0%{opacity:1;filter:blur(0);transform:scale(1)}
      100%{opacity:0;filter:blur(6px);transform:scale(0.97)}
    }
    @keyframes dissolveIn{
      0%{opacity:0;filter:blur(8px);transform:scale(1.03)}
      100%{opacity:1;filter:blur(0);transform:scale(1)}
    }

    /* === CYCLE PROGRESS BAR === */
    .cycle-bar{
      position:absolute;top:0;left:0;right:0;height:4px;z-index:30;
      background:transparent;overflow:hidden;
    }
    .cycle-bar-fill{
      height:100%;width:0%;
      background:linear-gradient(90deg,var(--sage),var(--gold));
      transition:width 1s linear;
      box-shadow:0 0 10px rgba(255,217,110,0.6);
    }

    /* === MIC INDICATOR === */
    .mic-pill{
      display:flex;align-items:center;gap:5px;
      font-size:0.5rem;font-weight:800;color:var(--text-2);
      text-transform:uppercase;letter-spacing:1px;
      padding:3px 8px;border-radius:10px;
      background:rgba(255,255,255,0.1);border:1px solid var(--border-2);
      transition:all 0.3s;cursor:pointer;
    }
    .mic-pill.listening{color:var(--sage);border-color:rgba(125,212,160,0.3);background:rgba(125,212,160,0.1)}
    .mic-pill .mic-dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);transition:all 0.3s}
    .mic-pill.listening .mic-dot{background:var(--sage);box-shadow:0 0 6px rgba(125,212,160,0.5);animation:blink 1.2s infinite}

    /* === BREATHING GLOW === */
    .card{animation:breathGlow 4s ease-in-out infinite}
    @keyframes breathGlow{
      0%,100%{box-shadow:0 4px 24px rgba(0,0,0,0.5)}
      50%{box-shadow:0 4px 28px rgba(255,217,110,0.2),0 4px 24px rgba(0,0,0,0.5)}
    }

    /* === SHARED COMPONENTS === */
    .mode-enter{animation:dissolveIn 0.4s ease-out}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:6px 14px;border-radius:6px;
      font-size:0.75rem;font-weight:800;
      text-transform:uppercase;letter-spacing:1.5px;
    }
    .badge-gold{background:rgba(255,217,110,0.3);color:var(--gold);border:1px solid rgba(255,217,110,0.5)}
    .badge-sage{background:rgba(110,240,168,0.28);color:var(--sage);border:1px solid rgba(110,240,168,0.45)}
    .badge-warm{background:rgba(255,168,112,0.3);color:var(--warm);border:1px solid rgba(255,168,112,0.5)}
    .badge-slate{background:rgba(160,200,255,0.28);color:var(--slate);border:1px solid rgba(160,200,255,0.45)}
    .card{
      background:var(--surface);border:2px solid var(--border-2);
      border-radius:14px;backdrop-filter:blur(10px);overflow:hidden;
      box-shadow:0 4px 24px rgba(0,0,0,0.5);
    }

    /* === QUIZ === */
    .mq{display:flex;flex-direction:column;gap:7px;flex:1}
    .mq .card{border-left:4px solid var(--sage);background:rgba(110,240,168,0.1)}
    .mq .q-box{padding:18px 14px 14px;text-align:center}
    .mq .q-box h2{font-size:1.35rem;font-weight:900;line-height:1.3;letter-spacing:-0.01em;text-shadow:0 1px 8px rgba(0,0,0,0.5)}
    .mq .opts{display:flex;flex-direction:column;gap:6px}
    .mq .opt{
      display:flex;align-items:center;gap:12px;
      padding:11px 12px;background:rgba(34,37,56,0.9);
      border:2px solid var(--border-2);border-radius:10px;
      cursor:pointer;transition:all 0.2s;
    }
    .mq .opt:hover{border-color:var(--border-2);background:rgba(255,255,255,0.04)}
    .mq .opt .ltr{
      width:40px;height:40px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:1.1rem;flex-shrink:0;
    }
    .mq .opt:nth-child(1) .ltr{background:rgba(255,168,112,0.35);color:var(--warm)}
    .mq .opt:nth-child(2) .ltr{background:rgba(160,200,255,0.35);color:var(--slate)}
    .mq .opt:nth-child(3) .ltr{background:rgba(110,240,168,0.35);color:var(--sage)}
    .mq .opt .otxt{font-size:1.05rem;font-weight:700;text-align:left}
    .mq .chat-cta{
      text-align:center;padding:12px;
      background:rgba(255,217,110,0.28);border:2px solid rgba(255,217,110,0.45);
      border-radius:10px;
    }
    .mq .chat-cta h3{font-size:1.1rem;font-weight:900;color:var(--gold);margin-bottom:2px;text-shadow:0 1px 6px rgba(0,0,0,0.4)}
    .mq .chat-cta p{font-size:0.8rem;color:var(--text-2)}
    .timer-wrap{display:flex;align-items:center;gap:8px}
    .timer-lbl{
      font-family:'JetBrains Mono',monospace;
      font-size:0.85rem;font-weight:800;color:var(--sage);white-space:nowrap;
    }
    .timer-track{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
    .timer-bar{height:100%;background:linear-gradient(90deg,var(--sage),var(--gold));border-radius:3px;width:100%;transition:width 1s linear}
    .mq .answer-reveal{
      display:none;padding:14px;text-align:center;
      border:2px solid rgba(110,240,168,0.45);border-radius:10px;
      background:rgba(110,240,168,0.2);
    }
    .mq .answer-reveal.show{display:block;animation:fadeUp 0.4s ease-out}
    .mq .answer-reveal h4{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--sage);margin-bottom:4px;font-weight:800}
    .mq .answer-reveal .ans{font-size:1.25rem;font-weight:900;margin-bottom:6px;text-shadow:0 1px 6px rgba(0,0,0,0.4)}
    .mq .answer-reveal .expl{font-size:0.95rem;color:var(--text-2);line-height:1.5;font-weight:500}

    /* === FACT === */
    .mf{display:flex;flex-direction:column;gap:8px;flex:1}
    .mf .fact-card{padding:0;border-left:4px solid var(--gold);background:rgba(255,217,110,0.1)}
    .mf .fact-img{width:100%;height:160px;object-fit:cover;display:block}
    .mf .fact-body{padding:14px;text-align:center}
    .mf .fact-icon{font-size:2rem;margin-bottom:4px;display:block}
    .mf .fact-body h2{font-size:1.3rem;font-weight:900;line-height:1.3;margin-bottom:8px;text-shadow:0 1px 8px rgba(0,0,0,0.5)}
    .mf .fact-body p{font-size:1rem;color:var(--text-2);line-height:1.5;font-weight:500}
    .mf .fact-source{font-size:0.75rem;color:var(--text-3);margin-top:8px;font-style:italic}

    /* === NEWS === */
    .mn{display:flex;flex-direction:column;gap:8px;flex:1}
    .mn .news-card{padding:18px 14px;text-align:center;border-left:4px solid var(--slate);background:rgba(160,200,255,0.1)}
    .mn .news-icon{font-size:2.2rem;margin-bottom:6px;display:block}
    .mn .news-cat{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--slate);margin-bottom:6px}
    .mn .news-card h2{font-size:1.3rem;font-weight:900;line-height:1.3;margin-bottom:8px;text-shadow:0 1px 8px rgba(0,0,0,0.5)}
    .mn .news-card p{font-size:1rem;color:var(--text-2);line-height:1.5;font-weight:500}
    .mn .news-card .hl{color:var(--slate);font-weight:700}
    .mn .news-source{
      margin-top:12px;padding-top:10px;border-top:1px solid var(--border);
      font-size:0.75rem;color:var(--text-3);font-weight:600;
      display:flex;align-items:center;justify-content:center;gap:5px;
    }
    .mn .news-source .dot{width:3px;height:3px;border-radius:50%;background:var(--text-3)}

    /* === THIS OR THAT === */
    .mt{display:flex;flex-direction:column;gap:8px;flex:1}
    .mt .tot-header{text-align:center;padding:6px}
    .mt .tot-header h2{font-size:1.1rem;font-weight:900;color:var(--gold);text-shadow:0 1px 6px rgba(0,0,0,0.4)}
    .mt .tot-header p{font-size:0.8rem;color:var(--text-2);margin-top:2px}
    .mt .tot-vs{display:flex;gap:8px;flex:1;align-items:stretch}
    .mt .tot-option{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:14px 10px;border-radius:14px;text-align:center;cursor:pointer;transition:all 0.2s;
      border:2px solid var(--border-2);background:rgba(34,37,56,0.95);
      box-shadow:0 4px 16px rgba(0,0,0,0.4);
    }
    .mt .tot-option:first-child{border-color:rgba(255,168,112,0.45);background:rgba(255,168,112,0.12)}
    .mt .tot-option:last-child{border-color:rgba(160,200,255,0.45);background:rgba(160,200,255,0.12)}
    .mt .tot-option:hover{border-color:var(--border-2);background:rgba(255,255,255,0.04)}
    .mt .tot-option .tot-emoji{font-size:2.2rem;margin-bottom:6px;display:block}
    .mt .tot-option .tot-label{font-size:1rem;font-weight:800;line-height:1.3}
    .mt .tot-option .tot-letter{
      font-size:0.75rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;margin-top:6px;
    }
    .mt .tot-option:first-child .tot-letter{color:var(--warm)}
    .mt .tot-option:last-child .tot-letter{color:var(--slate)}
    .mt .tot-divider{
      display:flex;align-items:center;justify-content:center;
      font-size:1.3rem;font-weight:900;color:var(--gold);align-self:center;
    }
    .mt .tot-reveal{
      display:none;padding:12px;text-align:center;
      border:2px solid rgba(255,217,110,0.45);border-radius:10px;
      background:rgba(255,217,110,0.2);
    }
    .mt .tot-reveal.show{display:block;animation:fadeUp 0.4s ease-out}
    .mt .tot-reveal h4{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:800;margin-bottom:4px}
    .mt .tot-reveal .ans{font-size:1.15rem;font-weight:900;margin-bottom:4px;text-shadow:0 1px 6px rgba(0,0,0,0.4)}
    .mt .tot-reveal .expl{font-size:0.9rem;color:var(--text-2);line-height:1.45;font-weight:500}

    /* Scientist Spotlight */
    .ms .spot-card{background:rgba(255,217,110,0.1);border:2px solid var(--border-2);border-left:4px solid var(--gold);border-radius:14px;padding:16px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
    .ms .spot-name{font-size:1.25rem;font-weight:900;color:var(--text);margin:6px 0 2px;text-shadow:0 1px 6px rgba(0,0,0,0.4)}
    .ms .spot-title{font-size:0.75rem;color:var(--gold);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:2px}
    .ms .spot-inst{font-size:0.75rem;color:var(--text-3);margin-bottom:10px}
    .ms .spot-photo{width:80px;height:80px;border-radius:50%;margin:0 auto 4px;display:block}
    .ms .spot-breakthrough{background:rgba(255,217,110,0.18);border:2px solid rgba(255,217,110,0.4);border-radius:10px;padding:12px;text-align:left;margin-top:10px}
    .ms .spot-breakthrough h3{font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:800;margin-bottom:6px}
    .ms .spot-breakthrough p{font-size:0.88rem;color:var(--text-2);line-height:1.5;font-weight:500}
    .ms .spot-breakthrough .hl{color:var(--text);font-weight:700}
    .ms .spot-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px}
    .ms .spot-tag{font-size:0.6rem;padding:3px 8px;border-radius:20px;background:var(--sage-dim);color:var(--sage);font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
    .ms .spot-source{font-size:0.65rem;color:var(--text-3);margin-top:8px;font-style:italic}

    /* Outbreak Report card */
    .mo .outbreak-card{background:rgba(255,168,112,0.1);border:2px solid var(--border-2);border-left:4px solid var(--warm);border-radius:14px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
    .mo .outbreak-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .mo .outbreak-emoji{font-size:2rem}
    .mo .outbreak-disease{font-size:0.65rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--warm);padding:3px 10px;border-radius:20px;background:rgba(255,168,112,0.25);border:2px solid rgba(255,168,112,0.45)}
    .mo .outbreak-status{font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:var(--text-3)}
    .mo .outbreak-headline{font-size:1.15rem;font-weight:900;color:var(--text);margin-bottom:14px;line-height:1.3}
    .mo .outbreak-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .mo .ob-stat{background:rgba(255,255,255,0.14);border:2px solid var(--border-2);border-radius:8px;padding:8px 10px;text-align:center}
    .mo .ob-stat-val{font-size:1.1rem;font-weight:900;font-family:'JetBrains Mono',monospace}
    .mo .ob-stat-val.up{color:#e06060}.mo .ob-stat-val.down{color:var(--sage)}.mo .ob-stat-val.baseline{color:var(--text-2)}
    .mo .ob-stat-label{font-size:0.6rem;color:var(--text-3);margin-top:2px}
    .mo .outbreak-detail{font-size:0.88rem;color:var(--text-2);line-height:1.5;margin-bottom:8px}
    .mo .outbreak-detail .hl{color:var(--text);font-weight:700}
    .mo .outbreak-cdc{font-size:0.65rem;color:var(--text-3);font-style:italic}

    /* Breakthrough card */
    .mb .break-card{background:rgba(255,217,110,0.1);border:2px solid var(--border-2);border-left:4px solid var(--gold);border-radius:14px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
    .mb .break-year{display:inline-block;font-size:0.65rem;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(219,185,118,0.2);padding:3px 10px;border-radius:20px;margin-bottom:6px}
    .mb .break-emoji{font-size:2.2rem;margin-bottom:4px}
    .mb .break-title{font-size:1.15rem;font-weight:900;color:var(--text);margin-bottom:10px;line-height:1.3}
    .mb .break-simple{font-size:0.92rem;color:var(--text-2);line-height:1.55;margin-bottom:12px}
    .mb .break-simple .hl{color:var(--text);font-weight:700}
    .mb .break-impact{background:rgba(110,240,168,0.18);border:2px solid rgba(110,240,168,0.4);border-radius:8px;padding:10px 12px;margin-bottom:8px}
    .mb .break-impact-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--sage);margin-bottom:4px}
    .mb .break-impact-text{font-size:0.85rem;color:var(--text-2);line-height:1.4}
    .mb .break-source{font-size:0.65rem;color:var(--text-3);font-style:italic}

    /* Myth Buster card */
    .mm .myth-card{background:rgba(255,100,100,0.1);border:2px solid var(--border-2);border-left:4px solid #ff6060;border-radius:14px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}

    .mm .myth-verdict.false{background:rgba(255,100,100,0.3);color:#ff7070;border:2px solid rgba(255,100,100,0.55)}
    .mm .myth-verdict.misleading{background:rgba(255,217,110,0.3);color:var(--gold);border:2px solid rgba(255,217,110,0.55)}
    .mm .myth-verdict.misunderstood{background:rgba(160,200,255,0.3);color:var(--slate);border:2px solid rgba(160,200,255,0.55)}
    .mm .myth-claim{font-size:1.1rem;font-weight:900;color:#e06060;margin-bottom:10px;line-height:1.3}
    .mm .myth-claim::before{content:'"';opacity:0.4}.mm .myth-claim::after{content:'"';opacity:0.4}
    .mm .myth-conspiracy{font-size:0.82rem;color:var(--text-3);margin-bottom:12px;font-style:italic}
    .mm .myth-science-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--sage);margin-bottom:6px}
    .mm .myth-science{font-size:0.88rem;color:var(--text-2);line-height:1.55;margin-bottom:10px}
    .mm .myth-science .hl{color:var(--text);font-weight:700}
    .mm .myth-evidence{font-size:0.7rem;color:var(--text-3);font-style:italic}

    /* Read More links */

      letter-spacing:0.5px;transition:all 0.2s}

    /* Landscape warning */
    @media(orientation:landscape) and (max-height:500px){
      body::after{
        content:'Rotate to portrait';position:fixed;inset:0;
        background:var(--bg);display:flex;align-items:center;
        justify-content:center;font-size:1.1rem;color:var(--text-2);z-index:9999;
      }
    }
  </style>

  </div>

<script src="content.js"></script>
<script>
let currentViz = null;
let vizRAF = null;

function initViz(){
  const canvas = document.getElementById('viz');
  const panel = canvas.parentElement;
  const dpr = 3;
  canvas.width = panel.clientWidth * dpr;
  canvas.height = panel.clientHeight * dpr;
  canvas.style.width = panel.clientWidth + 'px';
  canvas.style.height = panel.clientHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W = panel.clientWidth, H = panel.clientHeight;
  if(vizRAF) cancelAnimationFrame(vizRAF);
  const type = pickUnique(VIZ_TYPES,'viz');
  currentViz = type;
  document.getElementById('viz-label').textContent = VIZ_LABELS[type]||type;
  const C={gold:'#c4a265',sage:'#6b8f7a',slate:'#6b7fa6',warm:'#b07a5e',rose:'#a06b6b'};
  ctx.fillStyle='#0a0a0e';ctx.fillRect(0,0,W,H);
  VIZ_FNS[type](ctx,W,H,C);
}

const BG='rgba(10,10,14,';
// Voice reactivity helpers for viz — call inside draw loops
function vScale(base){return base*(1+micLevel*1.5)} // scale sizes with voice
function vSpeed(base){return base*(1+micLevel*2)} // speed up with voice
function vAlpha(base){return Math.min(1,base*(1+micLevel*2))} // brighten with voice
const VIZ_FNS = {

// 1. DNA DOUBLE HELIX
dna(ctx,W,H,C){let t=0;const n=30;const amp=W*0.22;(function d(){ctx.fillStyle=BG+'0.12)';ctx.fillRect(0,0,W,H);t+=vSpeed(0.02);
for(let i=0;i<n;i++){const y=((i/n)*H*1.3+t*30)%H-H*0.15,p=i*0.5+t*2,x1=W/2+Math.sin(p)*amp,x2=W/2-Math.sin(p)*amp,dp=Math.cos(p);
// Glow on strands
const gc=dp>0?C.gold:C.sage;ctx.fillStyle=gc;ctx.globalAlpha=0.08;ctx.beginPath();ctx.arc(x1,y,14,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x2,y,14,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=gc;ctx.globalAlpha=0.5+Math.abs(dp)*0.4;ctx.lineWidth=3;
ctx.beginPath();ctx.arc(x1,y,6,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(x2,y,6,0,Math.PI*2);ctx.stroke();
ctx.strokeStyle=C.slate;ctx.globalAlpha=0.25+Math.abs(dp)*0.35;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
ctx.fillStyle=gc;ctx.globalAlpha=0.85;ctx.beginPath();ctx.arc(x1,y,4.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x2,y,4.5,0,Math.PI*2);ctx.fill();}
ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 2. NEURAL NETWORK
neurons(ctx,W,H,C){const ns=[];for(let i=0;i<40;i++)ns.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:3+Math.random()*3});
const ps=[];let t=0;(function d(){ctx.fillStyle=BG+'0.06)';ctx.fillRect(0,0,W,H);t++;
const mv=1+micLevel*3;ns.forEach(n=>{n.x+=n.vx*mv;n.y+=n.vy*mv;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1});
for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const dx=ns[j].x-ns[i].x,dy=ns[j].y-ns[i].y,dist=Math.sqrt(dx*dx+dy*dy);
if(dist<130){ctx.strokeStyle=C.slate;ctx.globalAlpha=0.15*(1-dist/130);ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(ns[i].x,ns[i].y);ctx.lineTo(ns[j].x,ns[j].y);ctx.stroke()}}
if(t%20===0){const a=ns[~~(Math.random()*ns.length)],b=ns[~~(Math.random()*ns.length)];if(a!==b)ps.push({x:a.x,y:a.y,tx:b.x,ty:b.y,p:0})}
for(let i=ps.length-1;i>=0;i--){const p=ps[i];p.p+=0.03;if(p.p>=1){ps.splice(i,1);continue}
const px=p.x+(p.tx-p.x)*p.p,py=p.y+(p.ty-p.y)*p.p;
ctx.fillStyle=C.gold;ctx.globalAlpha=0.9*(1-p.p);ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
ctx.globalAlpha=0.25*(1-p.p);ctx.beginPath();ctx.arc(px,py,12,0,Math.PI*2);ctx.fill()}
ns.forEach(n=>{ctx.fillStyle=C.sage;ctx.globalAlpha=0.15;ctx.beginPath();ctx.arc(n.x,n.y,n.r+6,0,Math.PI*2);ctx.fill();
ctx.fillStyle=C.sage;ctx.globalAlpha=0.85;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill()});
ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 3. CELL DIVISION
cells(ctx,W,H,C){const cs=[];const cols=[C.sage,C.slate,C.warm,'#a06b6b'];
for(let i=0;i<20;i++)cs.push({x:Math.random()*W,y:Math.random()*H,r:18+Math.random()*24,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,c:cols[~~(Math.random()*4)],ph:Math.random()*6.28});
let t=0;(function d(){ctx.fillStyle=BG+'0.05)';ctx.fillRect(0,0,W,H);t+=vSpeed(0.01);
const mv=1+micLevel*2;cs.forEach(c=>{c.x+=c.vx*mv;c.y+=c.vy*mv;if(c.x<c.r||c.x>W-c.r)c.vx*=-1;if(c.y<c.r||c.y>H-c.r)c.vy*=-1;
const w=Math.sin(t*2+c.ph)*4;
// Outer glow
ctx.fillStyle=c.c;ctx.globalAlpha=0.06;ctx.beginPath();ctx.ellipse(c.x,c.y,c.r+w+8,c.r-w*0.5+8,t+c.ph,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=c.c;ctx.globalAlpha=0.6;ctx.lineWidth=2.5;
ctx.beginPath();ctx.ellipse(c.x,c.y,c.r+w,c.r-w*0.5,t+c.ph,0,Math.PI*2);ctx.stroke();
ctx.fillStyle=c.c;ctx.globalAlpha=0.1;ctx.beginPath();ctx.ellipse(c.x,c.y,c.r+w-2,c.r-w*0.5-2,t+c.ph,0,Math.PI*2);ctx.fill();
// Nucleus
ctx.fillStyle=c.c;ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(c.x+Math.sin(t+c.ph)*3,c.y+Math.cos(t+c.ph)*3,c.r*0.3,0,Math.PI*2);ctx.fill();
// Organelles
for(let o=0;o<3;o++){const ox=c.x+Math.cos(t*1.5+c.ph+o*2.1)*c.r*0.5,oy=c.y+Math.sin(t*1.5+c.ph+o*2.1)*c.r*0.4;
ctx.fillStyle=c.c;ctx.globalAlpha=0.25;ctx.beginPath();ctx.arc(ox,oy,2.5,0,Math.PI*2);ctx.fill()}});
ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 4. MOLECULAR MOTION
particles(ctx,W,H,C){const pts=[];const cols=[C.gold,C.sage,C.slate,C.warm];
for(let i=0;i<90;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*1.2,vy:(Math.random()-0.5)*1.2,r:2+Math.random()*3,c:cols[~~(Math.random()*4)]});
(function d(){ctx.fillStyle=BG+'0.08)';ctx.fillRect(0,0,W,H);
const mv=1+micLevel*3;pts.forEach(p=>{p.x+=p.vx*mv;p.y+=p.vy*mv;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
p.vx+=(W/2-p.x)*0.00005;p.vy+=(H/2-p.y)*0.00005;p.vx*=0.999;p.vy*=0.999;
ctx.fillStyle=p.c;ctx.globalAlpha=0.1;ctx.beginPath();ctx.arc(p.x,p.y,p.r+5,0,Math.PI*2);ctx.fill();
ctx.fillStyle=p.c;ctx.globalAlpha=0.75;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
ctx.globalAlpha=0.2;ctx.beginPath();ctx.arc(p.x-p.vx*3,p.y-p.vy*3,p.r*0.7,0,Math.PI*2);ctx.fill()});
for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[j].x-pts[i].x,dy=pts[j].y-pts[i].y,dd=Math.sqrt(dx*dx+dy*dy);
if(dd<60){ctx.strokeStyle=pts[i].c;ctx.globalAlpha=0.15*(1-dd/60);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke()}}
ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 5. WAVE INTERFERENCE
waves(ctx,W,H,C){let t=0;const cols=[C.gold,C.sage,C.slate];
(function d(){ctx.fillStyle=BG+'0.08)';ctx.fillRect(0,0,W,H);t+=0.03;
for(let w=0;w<3;w++){ctx.strokeStyle=cols[w];ctx.globalAlpha=0.35;ctx.lineWidth=1.5;ctx.beginPath();
for(let x=0;x<W;x+=2){const y=H/2+Math.sin(x*0.02+t+w*2)*30*Math.sin(x*0.005+t*0.5)+Math.sin(x*0.04+t*1.5+w)*15;
if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}
ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 6. BLOOD FLOW — red cells flowing through a vessel
bloodflow(ctx,W,H,C){const rbcs=[];const vesselH=H*0.35;
for(let i=0;i<50;i++)rbcs.push({x:Math.random()*W*1.5-W*0.25,y:H/2+(Math.random()-0.5)*vesselH*0.7,s:0.6+Math.random()*1,r:6+Math.random()*5,wobble:Math.random()*6.28});
let t=0;(function d(){ctx.fillStyle=BG+'0.1)';ctx.fillRect(0,0,W,H);t+=0.02;
// Vessel wall glow
ctx.fillStyle=C.warm;ctx.globalAlpha=0.04;ctx.fillRect(0,H/2-vesselH/2-10,W,vesselH+20);
// Vessel walls
ctx.strokeStyle=C.warm;ctx.globalAlpha=0.3;ctx.lineWidth=3;
ctx.beginPath();ctx.moveTo(0,H/2-vesselH/2);for(let x=0;x<W;x+=4)ctx.lineTo(x,H/2-vesselH/2+Math.sin(x*0.01+t)*5);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,H/2+vesselH/2);for(let x=0;x<W;x+=4)ctx.lineTo(x,H/2+vesselH/2+Math.sin(x*0.01+t)*5);ctx.stroke();
// RBCs
rbcs.forEach(c=>{c.x+=c.s;c.y+=Math.sin(t*3+c.wobble)*0.4;if(c.x>W+25)c.x=-25;
ctx.fillStyle=C.warm;ctx.globalAlpha=0.08;ctx.beginPath();ctx.ellipse(c.x,c.y,c.r+4,c.r*0.6+4,Math.sin(t+c.wobble)*0.3,0,Math.PI*2);ctx.fill();
ctx.fillStyle=C.warm;ctx.globalAlpha=0.6+c.r*0.03;
ctx.beginPath();ctx.ellipse(c.x,c.y,c.r,c.r*0.6,Math.sin(t+c.wobble)*0.3,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#0a0a0e';ctx.globalAlpha=0.25;ctx.beginPath();ctx.arc(c.x,c.y,c.r*0.3,0,Math.PI*2);ctx.fill()});
ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 7. SYNAPSE — neurotransmitter release
synapse(ctx,W,H,C){let t=0;const vesicles=[];
(function d(){ctx.fillStyle=BG+'0.1)';ctx.fillRect(0,0,W,H);t+=0.02;
// Pre-synaptic terminal
ctx.fillStyle=C.sage;ctx.globalAlpha=0.12;ctx.beginPath();ctx.arc(W/2,H*0.2,60,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=C.sage;ctx.globalAlpha=0.3;ctx.lineWidth=2;ctx.beginPath();ctx.arc(W/2,H*0.2,60,0,Math.PI*2);ctx.stroke();
// Post-synaptic terminal
ctx.fillStyle=C.slate;ctx.globalAlpha=0.12;ctx.beginPath();ctx.arc(W/2,H*0.8,60,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=C.slate;ctx.globalAlpha=0.3;ctx.lineWidth=2;ctx.beginPath();ctx.arc(W/2,H*0.8,60,0,Math.PI*2);ctx.stroke();
// Receptors
for(let i=-3;i<=3;i++){ctx.fillStyle=C.slate;ctx.globalAlpha=0.4;ctx.fillRect(W/2+i*16-3,H*0.8-62,6,10)}
// Release vesicles periodically
if(Math.random()<0.06)vesicles.push({x:W/2+(Math.random()-0.5)*40,y:H*0.2+55,vy:0.5+Math.random()*0.5,a:1,r:3+Math.random()*2});
for(let i=vesicles.length-1;i>=0;i--){const v=vesicles[i];v.y+=v.vy;v.x+=Math.sin(t*5+i)*0.5;
if(v.y>H*0.8-60){v.a-=0.03}if(v.a<=0){vesicles.splice(i,1);continue}
ctx.fillStyle=C.gold;ctx.globalAlpha=v.a*0.7;ctx.beginPath();ctx.arc(v.x,v.y,v.r,0,Math.PI*2);ctx.fill();
ctx.globalAlpha=v.a*0.2;ctx.beginPath();ctx.arc(v.x,v.y,v.r*2.5,0,Math.PI*2);ctx.fill()}
// Synaptic cleft label line
ctx.strokeStyle=C.gold;ctx.globalAlpha=0.08;ctx.lineWidth=0.5;ctx.setLineDash([4,4]);
ctx.beginPath();ctx.moveTo(W*0.1,H*0.5);ctx.lineTo(W*0.9,H*0.5);ctx.stroke();ctx.setLineDash([]);
ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 8. HEARTBEAT — pulsing heart + ECG trace
heartbeat(ctx,W,H,C){let t=0;const ecg=[];
(function d(){ctx.fillStyle=BG+'0.12)';ctx.fillRect(0,0,W,H);t+=vSpeed(0.03);
// ECG trace
const ecgY=H*0.7;ecg.push(Math.sin(t*2)*2+(t%3<0.3?Math.sin(t*20)*20*(1-Math.abs(t%3-0.15)/0.15):0));
if(ecg.length>W)ecg.shift();
ctx.strokeStyle=C.sage;ctx.globalAlpha=0.6;ctx.lineWidth=1.5;ctx.beginPath();
ecg.forEach((v,i)=>{if(i===0)ctx.moveTo(i,ecgY+v);else ctx.lineTo(i,ecgY+v)});ctx.stroke();
// Dot at end
ctx.fillStyle=C.sage;ctx.globalAlpha=0.9;ctx.beginPath();ctx.arc(ecg.length-1,ecgY+ecg[ecg.length-1],3,0,Math.PI*2);ctx.fill();
// Pulsing heart
const beat=Math.sin(t*2);const scale=1+Math.max(0,beat)*0.15;const cx=W/2,cy=H*0.35;
ctx.save();ctx.translate(cx,cy);ctx.scale(scale,scale);
ctx.fillStyle=C.warm;ctx.globalAlpha=0.06+Math.max(0,beat)*0.08;
ctx.beginPath();ctx.arc(-15,-5,22,0,Math.PI*2);ctx.arc(15,-5,22,0,Math.PI*2);ctx.moveTo(-37,0);
ctx.bezierCurveTo(-37,25,0,45,0,55);ctx.bezierCurveTo(0,45,37,25,37,0);ctx.fill();
ctx.strokeStyle=C.warm;ctx.globalAlpha=0.3+Math.max(0,beat)*0.3;ctx.lineWidth=1.5;
ctx.beginPath();ctx.arc(-15,-5,22,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(15,-5,22,0,Math.PI*2);ctx.stroke();
ctx.restore();ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 9. FLOCKING BEHAVIOR (Boids)
boids(ctx,W,H,C){const bs=[];for(let i=0;i<80;i++)bs.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2});
(function d(){ctx.fillStyle=BG+'0.1)';ctx.fillRect(0,0,W,H);
bs.forEach(b=>{let sx=0,sy=0,cx=0,cy=0,ax=0,ay=0,n=0;
bs.forEach(o=>{if(o===b)return;const dx=o.x-b.x,dy=o.y-b.y,dd=dx*dx+dy*dy;
if(dd<2500){n++;cx+=o.x;cy+=o.y;sx+=o.vx;sy+=o.vy;if(dd<400){ax-=dx;ay-=dy}}});
if(n>0){cx=cx/n-b.x;cy=cy/n-b.y;sx=sx/n-b.vx;sy=sy/n-b.vy;
b.vx+=cx*0.003+sx*0.05+ax*0.05;b.vy+=cy*0.003+sy*0.05+ay*0.05}
const mxSpd=2+micLevel*4;const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(spd>mxSpd){b.vx=(b.vx/spd)*mxSpd;b.vy=(b.vy/spd)*mxSpd}
b.x+=b.vx;b.y+=b.vy;if(b.x<0)b.x=W;if(b.x>W)b.x=0;if(b.y<0)b.y=H;if(b.y>H)b.y=0;
const ang=Math.atan2(b.vy,b.vx);ctx.save();ctx.translate(b.x,b.y);ctx.rotate(ang);
ctx.fillStyle=C.gold;ctx.globalAlpha=0.07;ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(-6,-5);ctx.lineTo(-6,5);ctx.closePath();ctx.fill();
ctx.fillStyle=C.gold;ctx.globalAlpha=0.7;ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(-4,-3);ctx.lineTo(-4,3);ctx.closePath();ctx.fill();ctx.restore()});
ctx.globalAlpha=1;vizRAF=requestAnimationFrame(d)})()},

// 10. FRACTAL TREE
fractree(ctx,W,H,C){let growth=0;const cols=[C.sage,C.gold,C.warm];
function branch(x,y,len,ang,depth,maxD){if(depth>maxD||len<2)return;
const ex=x+Math.cos(ang)*len,ey=y+Math.sin(ang)*len;
ctx.strokeStyle=cols[depth%3];ctx.globalAlpha=0.3+0.1*(maxD-depth);ctx.lineWidth=Math.max(0.5,3-depth*0.4);
ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);ctx.stroke();
if(depth<maxD){branch(ex,ey,len*0.7,ang-0.4-Math.sin(growth+depth)*0.1,depth+1,maxD);
branch(ex,ey,len*0.7,ang+0.4+Math.sin(growth+depth)*0.1,depth+1,maxD);

const MODES=['quiz','fact','news','thisorthat','spotlight','outbreak','breakthrough','mythbuster'];

let modeQueue=[];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// Shuffle-bag system: cycles through ALL items before repeating
const _bags={};
function pickUnique(arr,key){
  if(!_bags[key]||_bags[key].length===0) _bags[key]=shuffle(arr);
  return _bags[key].pop();
}
function pick(a){return a[Math.floor(Math.random()*a.length)]}

function getMode(){
  if(modeQueue.length===0) modeQueue=shuffle(MODES);
  // Prevent adjacent repeat at dequeue time — re-shuffle if needed
  let safety=0;
  while(modeQueue[0]===lastMode && safety++<10){
    if(modeQueue.length>1) modeQueue.push(modeQueue.shift());
    else { modeQueue=shuffle(MODES); }
  }
  const m=modeQueue.shift();
  lastMode=m;return m;
}

let audioCtx=null,audioOn=true;
// ============================================================
// VOICE DETECTION + AUTO-CYCLE
// ============================================================
let micStream=null,micAnalyser=null,micData=null,micOn=false;
let micLevel=0; // 0-1, exposed globally for viz reactivity
let isSpeaking=false,silenceStart=0;
const SILENCE_TRIGGER=2500; // ms of silence before next card
const SPEAK_THRESHOLD=0.06; // volume threshold for "speaking"
let cycleTimer=null,cycleStart=0,cycleDuration=30000;
let cycleRAF=null;

function getCycleDuration(){
  // Quiz and ThisOrThat get extra time
  const m=lastMode;
  return (m==='quiz'||m==='thisorthat')?45000:30000;
}

function startCycleTimer(){
  clearTimeout(cycleTimer);
  cancelAnimationFrame(cycleRAF);
  cycleDuration=getCycleDuration();
  cycleStart=Date.now();
  const bar=document.getElementById('cycleBar');
  if(bar)bar.style.transition='none',bar.style.width='0%';
  // Animate progress bar
  requestAnimationFrame(()=>{
    if(bar)bar.style.transition=`width ${cycleDuration/1000}s linear`,bar.style.width='100%';
  });
  cycleTimer=setTimeout(()=>transitionToNext(),cycleDuration);
}

function transitionToNext(){
  clearTimeout(cycleTimer);
  const el=document.getElementById('content');
  // Dissolve out
  el.classList.add('dissolve-out');
  setTimeout(()=>{
    el.classList.remove('dissolve-out');
    loadNewContent();
    el.classList.add('dissolve-in');
    setTimeout(()=>el.classList.remove('dissolve-in'),450);
    startCycleTimer();
  },300);
}

// Mic monitoring loop
function micLoop(){
  if(!micAnalyser||!micOn)return;
  micAnalyser.getByteFrequencyData(micData);
  // Compute RMS level
  let sum=0;
  for(let i=0;i<micData.length;i++)sum+=micData[i]*micData[i];
  micLevel=Math.sqrt(sum/micData.length)/255; // 0-1

  const wasSpeaking=isSpeaking;
  isSpeaking=micLevel>SPEAK_THRESHOLD;

  if(isSpeaking){
    silenceStart=0; // reset silence timer while speaking
  } else if(wasSpeaking && !isSpeaking){
    // Just went silent
    silenceStart=Date.now();
  } else if(!isSpeaking && silenceStart>0){
    // Check if silence long enough to trigger
    if(Date.now()-silenceStart>=SILENCE_TRIGGER){
      silenceStart=0;
      transitionToNext();
    }
  }

  requestAnimationFrame(micLoop);
}

async function toggleMic(){
  const pill=document.getElementById('micPill');
  if(micOn){
    // Turn off
    micOn=false;
    micLevel=0;
    if(micStream)micStream.getTracks().forEach(t=>t.stop());
    micStream=null;micAnalyser=null;micData=null;
    pill.classList.remove('listening');
    return;
  }
  // Turn on — request mic
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    if(!audioCtx)initAudio();
    const src=audioCtx.createMediaStreamSource(micStream);
    micAnalyser=audioCtx.createAnalyser();
    micAnalyser.fftSize=256;
    micAnalyser.smoothingTimeConstant=0.8;
    src.connect(micAnalyser);
    micData=new Uint8Array(micAnalyser.frequencyBinCount);
    micOn=true;
    pill.classList.add('listening');
    micLoop();
  }catch(e){
    console.log('Mic access denied');
  }
}

function playSfxTone(type){
  if(!audioCtx||!audioOn)return;
  const now=audioCtx.currentTime;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  if(type==='reveal'){
    // Rising chime
    o.type='sine';o.frequency.value=600;
    o.frequency.linearRampToValueAtTime(1200,now+0.15);
    g.gain.value=0.2;g.gain.linearRampToValueAtTime(0,now+0.5);
    o.start(now);o.stop(now+0.5);
    // Second tone
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.connect(g2);g2.connect(audioCtx.destination);
    o2.type='sine';o2.frequency.value=900;
    o2.frequency.linearRampToValueAtTime(1500,now+0.25);
    g2.gain.value=0.15;g2.gain.linearRampToValueAtTime(0,now+0.6);
    o2.start(now+0.1);o2.stop(now+0.6);
  } else {
    // Soft whoosh/tick for transitions
    o.type='triangle';o.frequency.value=300;
    o.frequency.linearRampToValueAtTime(100,now+0.2);
    g.gain.value=0.12;g.gain.linearRampToValueAtTime(0,now+0.25);
    o.start(now);o.stop(now+0.25);
  }
}

function initAudio(){
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return}
  const btn=document.getElementById('audioBtn');
  btn.classList.add('active');
  if(audioCtx.state==='suspended'){
    const resume=()=>{audioCtx.resume();
      document.removeEventListener('click',resume);document.removeEventListener('touchstart',resume)};
    document.addEventListener('click',resume);document.addEventListener('touchstart',resume);
  }
}
function toggleAudio(){
  const btn=document.getElementById('audioBtn');
  audioOn=!audioOn;btn.classList.toggle('active',audioOn);
  if(audioOn){
    if(!audioCtx)initAudio();
    else if(audioCtx.state==='suspended')audioCtx.resume();
  } else {
    if(audioCtx)audioCtx.suspend();
  }
}
function playSfx(t){ playSfxTone(t); }

// ============================================================
// MAIN
// ============================================================
function reveal(){
  if(quizTimer)clearInterval(quizTimer);
  const a=document.getElementById('ans'),l=document.getElementById('tlbl'),b=document.getElementById('tbar');
  if(a){a.classList.add('show');setTimeout(()=>a.scrollIntoView({behavior:'smooth',block:'center'}),100)}
  if(l)l.textContent='0:00';if(b)b.style.width='0%';
  playSfx('reveal');
}

function loadNewContent(){
  if(quizTimer)clearInterval(quizTimer);
  playSfx('transition');
  document.getElementById('stats').innerHTML=renderStats();
  const el=document.getElementById('content');
  const mode=getMode();
  switch(mode){
    case 'quiz':el.innerHTML=renderQuiz();startTimer();break;
    case 'fact':el.innerHTML=renderFact();break;
    case 'news':el.innerHTML=renderNews();break;
    case 'thisorthat':el.innerHTML=renderThisOrThat();startTotTimer();break;
    case 'spotlight':el.innerHTML=renderSpotlight();break;
    case 'outbreak':el.innerHTML=renderOutbreak();break;
    case 'breakthrough':el.innerHTML=renderBreakthrough();break;
    case 'mythbuster':el.innerHTML=renderMyth();break;
  }
  initViz();
}

function initTicker(){
  const el=document.getElementById('ticker');
  const s=shuffle(TICKER);
  el.innerHTML=[...s,...s].map(t=>`<span>${t.replace(/@drgregshow/g,'<b class="hl">@drgregshow</b>').replace(/patreon\.com\/drgregshow/g,'<b class="hl">patreon.com/drgregshow</b>')}</span>`).join('');
}

// Boot
initTicker();
initAudio();
loadNewContent();
startCycleTimer();
window.addEventListener('resize',()=>{if(currentViz)initViz()});
</script>
